substitutions:
  device_name: pmc220
  friendly_name: "PMC-220"
  prefix: "PMC"
  modbus_address: "24"        # Modbus slave ID (default: last 2 digits of SN, or 1)
  uart_rx_pin: GPIO5
  uart_tx_pin: GPIO20
  # uart_flow_control_pin: GPIO6

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: solarbox.${prefix}
    version: "2026.5.3"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  # encryption:
    # key: !secret api_encryption_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "solarbox.uk"
    password: "12345678"

captive_portal:

# ── RS-485 / Modbus RTU ──────────────────────────────────────────────────────
# PMC-220 default: 9600 baud, 8E1 (even parity, 1 stop bit)
uart:
  id: modbus_uart
  rx_pin: ${uart_rx_pin}
  tx_pin: ${uart_tx_pin}
  baud_rate: 9600
  data_bits: 8
  parity: EVEN
  stop_bits: 1

modbus:
  id: pmc_modbus
  uart_id: modbus_uart
  # flow_control_pin: ${uart_flow_control_pin}

modbus_controller:
  - id: pmc220
    address: ${modbus_address}
    modbus_id: pmc_modbus
    update_interval: 1s        # fast sensors poll every 1s
    command_throttle: 50ms

sensor:
  # ── Basic Measurements — updated every 1s ─────────────────────────────────
  # Registers 0–12 (decimal), IEEE 754 float, big-endian, 2 registers each

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} Voltage"
    id: pmc_voltage
    register_type: holding
    address: 0
    value_type: FP32
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} Current"
    id: pmc_current
    register_type: holding
    address: 2
    value_type: FP32
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 3

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} Active Power"
    id: pmc_power
    register_type: holding
    address: 4
    value_type: FP32
    unit_of_measurement: "kW"
    device_class: power
    state_class: measurement
    accuracy_decimals: 3

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} Reactive Power"
    id: pmc_reactive_power
    register_type: holding
    address: 6
    value_type: FP32
    unit_of_measurement: "kvar"
    state_class: measurement
    accuracy_decimals: 3

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} Apparent Power"
    id: pmc_apparent_power
    register_type: holding
    address: 8
    value_type: FP32
    unit_of_measurement: "kVA"
    state_class: measurement
    accuracy_decimals: 3

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} Power Factor"
    id: pmc_pf
    register_type: holding
    address: 10
    value_type: FP32
    unit_of_measurement: ""
    device_class: power_factor
    state_class: measurement
    accuracy_decimals: 3

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} Frequency"
    id: pmc_frequency
    register_type: holding
    address: 12
    value_type: FP32
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2

  # ── Energy Measurements — updated every 30s ───────────────────────────────
  # Registers 40–58 (decimal), INT32 (signed 32-bit), scale ×0.01
  # skip_updates: 29 with update_interval: 1s → poll every 30th cycle = 30s

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} kWh Import"
    id: pmc_kwh_import
    register_type: holding
    address: 40
    value_type: S_DWORD
    skip_updates: 29
    filters:
      - multiply: 0.01
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} kWh Export"
    id: pmc_kwh_export
    register_type: holding
    address: 42
    value_type: S_DWORD
    skip_updates: 29
    filters:
      - multiply: 0.01
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} kWh Net"
    id: pmc_kwh_net
    register_type: holding
    address: 44
    value_type: S_DWORD
    skip_updates: 29
    filters:
      - multiply: 0.01
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: measurement    # can be negative (Exp > Imp)
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} kWh Total"
    id: pmc_kwh_total
    register_type: holding
    address: 46
    value_type: S_DWORD
    skip_updates: 29
    filters:
      - multiply: 0.01
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} kvarh Import"
    id: pmc_kvarh_import
    register_type: holding
    address: 48
    value_type: S_DWORD
    skip_updates: 29
    filters:
      - multiply: 0.01
    unit_of_measurement: "kvarh"
    state_class: total_increasing
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} kvarh Export"
    id: pmc_kvarh_export
    register_type: holding
    address: 50
    value_type: S_DWORD
    skip_updates: 29
    filters:
      - multiply: 0.01
    unit_of_measurement: "kvarh"
    state_class: total_increasing
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} kvarh Net"
    id: pmc_kvarh_net
    register_type: holding
    address: 52
    value_type: S_DWORD
    skip_updates: 29
    filters:
      - multiply: 0.01
    unit_of_measurement: "kvarh"
    state_class: measurement    # can be negative
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} kvarh Total"
    id: pmc_kvarh_total
    register_type: holding
    address: 54
    value_type: S_DWORD
    skip_updates: 29
    filters:
      - multiply: 0.01
    unit_of_measurement: "kvarh"
    state_class: total_increasing
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: pmc220
    name: "${prefix} kVAh"
    id: pmc_kvah
    register_type: holding
    address: 56
    value_type: S_DWORD
    skip_updates: 29
    filters:
      - multiply: 0.01
    unit_of_measurement: "kVAh"
    state_class: total_increasing
    accuracy_decimals: 2

  # Running Hour (reg 58–59, UINT32, ×0.1 h) — requires firmware V2.00.00+; omitted on older firmware
  # - platform: modbus_controller
  #   modbus_controller_id: pmc220
  #   name: "${prefix} Running Hour"
  #   id: pmc_running_hour
  #   register_type: holding
  #   address: 58
  #   value_type: U_DWORD
  #   force_new_range: true
  #   skip_updates: 29
  #   filters:
  #     - multiply: 0.1
  #   unit_of_measurement: "h"
  #   device_class: duration
  #   state_class: total_increasing
  #   accuracy_decimals: 1
